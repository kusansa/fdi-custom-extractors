# ---------------------------------------------------------------------------
# Extractor Test Configuration Properties
# ---------------------------------------------------------------------------

# Class name of the Extractor implementation to be tested.
# This class is responsible for handling extraction logic for the given source type.
className=CovidDataExtractorImpl

# Logical source type identifier.
# Used by the Extract Service framework to map to a specific extractor implementation.
sourceType=COVIDDATA

# ---------------------------------------------------------------------------
# Output Configuration
# ---------------------------------------------------------------------------

# Directory path where the extracted files will be written.
# By default, '.' means the current working directory.
EXTRACT_OUTPUT_DIR=.

# ---------------------------------------------------------------------------
# Source Configuration
# ---------------------------------------------------------------------------

# GitHub username or organization that owns the target repository.
# Example: CSSEGISandData is the owner of the Johns Hopkins University COVID-19 dataset.
userName=CSSEGISandData

# Name of the GitHub repository containing data to be extracted.
# Example: COVID-19 is the repo hosting daily COVID-19 reports and time series.
repoName=COVID-19

# Branch name of the repository from which data will be fetched.
# Typically set to 'master' or 'main' depending on repository configuration.
branch=master

# ---------------------------------------------------------------------------
# Remote Host File Directory
# ---------------------------------------------------------------------------

# Relative directory path within the remote repository where extractable data files reside.
# For example: 'csse_covid_19_data' contains subdirectories like 'csse_covid_19_daily_reports'.
remoteHostExtractFilesDir=csse_covid_19_data
